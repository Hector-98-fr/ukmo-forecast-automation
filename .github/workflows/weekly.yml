```yaml
name: UKMO Forecast Automation

on:
  workflow_dispatch:

  schedule:
    - cron: "0 15 * * 1"

jobs:

  run-forecast:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run forecast pipeline
        run: |
          python forecast.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: ukmo-forecast-outputs
          path: outputs/
```
