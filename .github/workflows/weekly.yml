name: UKMO Forecast Automation

on:
  workflow_dispatch:

  schedule:
    - cron: "0 9 * * 1"

jobs:
  run-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forecast
        run: python forecast.py

      - name: Inspect filesystem
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Repository contents:"
          ls -R

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: ukmo-forecast
          path: outputs/
